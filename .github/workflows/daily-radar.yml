name: Daily Radar

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Radar mode to run
        required: true
        default: daily
        type: choice
        options:
          - daily
          - deep
      juan_only:
        description: Send only to Juan for test runs
        required: true
        default: false
        type: boolean
      dry_run:
        description: Run without sending email
        required: true
        default: false
        type: boolean
  repository_dispatch:
    types:
      - run-daily-radar

jobs:
  run-radar:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
      AGENTMAIL_INBOX_ID: ${{ secrets.AGENTMAIL_INBOX_ID }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve run configuration
        id: config
        env:
          WORKFLOW_MODE: ${{ inputs.mode }}
          WORKFLOW_JUAN_ONLY: ${{ inputs.juan_only }}
          WORKFLOW_DRY_RUN: ${{ inputs.dry_run }}
          DISPATCH_MODE: ${{ github.event.client_payload.mode }}
          DISPATCH_JUAN_ONLY: ${{ github.event.client_payload.juan_only }}
          DISPATCH_DRY_RUN: ${{ github.event.client_payload.dry_run }}
        run: |
          mode="${WORKFLOW_MODE:-daily}"
          juan_only="${WORKFLOW_JUAN_ONLY:-false}"
          dry_run="${WORKFLOW_DRY_RUN:-false}"

          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            if [ -n "$DISPATCH_MODE" ]; then
              mode="$DISPATCH_MODE"
            fi

            if [ "$DISPATCH_JUAN_ONLY" = "true" ]; then
              juan_only="true"
            else
              juan_only="false"
            fi

            if [ "$DISPATCH_DRY_RUN" = "true" ]; then
              dry_run="true"
            else
              dry_run="false"
            fi
          fi

          echo "mode=$mode" >> "$GITHUB_OUTPUT"

          if [ "$dry_run" = "true" ]; then
            echo "dry_run_flag=--dry-run" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run_flag=" >> "$GITHUB_OUTPUT"
          fi

          if [ "$juan_only" = "true" ]; then
            echo "juan_only_flag=--juan-only" >> "$GITHUB_OUTPUT"
          else
            echo "juan_only_flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Show resolved configuration
        run: |
          echo "event=${{ github.event_name }}"
          echo "mode=${{ steps.config.outputs.mode }}"
          echo "dry_run_flag=${{ steps.config.outputs.dry_run_flag }}"

      - name: Validate required secrets
        env:
          DRY_RUN_FLAG: ${{ steps.config.outputs.dry_run_flag }}
        run: |
          missing=0

          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::error::OPENROUTER_API_KEY is not set"
            missing=1
          fi

          if [ -z "$NEWSDATA_API_KEY" ]; then
            echo "::error::NEWSDATA_API_KEY is not set"
            missing=1
          fi

          if [ -z "$DRY_RUN_FLAG" ]; then
            if [ -z "$AGENTMAIL_API_KEY" ]; then
              echo "::error::AGENTMAIL_API_KEY is not set"
              missing=1
            fi

            if [ -z "$AGENTMAIL_INBOX_ID" ]; then
              echo "::error::AGENTMAIL_INBOX_ID is not set"
              missing=1
            fi

            if [ -z "$EMAIL_FROM" ]; then
              echo "::error::EMAIL_FROM is not set"
              missing=1
            fi
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run radar pipeline
        env:
          MODE: ${{ steps.config.outputs.mode }}
          DRY_RUN_FLAG: ${{ steps.config.outputs.dry_run_flag }}
          JUAN_ONLY_FLAG: ${{ steps.config.outputs.juan_only_flag }}
        run: |
          run_args=(--mode "$MODE")
          if [ -n "$DRY_RUN_FLAG" ]; then
            run_args+=("$DRY_RUN_FLAG")
          fi
          if [ -n "$JUAN_ONLY_FLAG" ]; then
            run_args+=("$JUAN_ONLY_FLAG")
          fi
          python -m src.main "${run_args[@]}"

      - name: Show pipeline log tail
        if: always()
        run: |
          if [ -f data/logs/andyjuan.jsonl ]; then
            tail -n 200 data/logs/andyjuan.jsonl
          else
            echo "No pipeline log file found"
          fi

      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-radar-logs
          path: data/logs/andyjuan.jsonl
          if-no-files-found: ignore
